<!DOCTYPE html>
<html>
<head>
  <title>Bharati App 🇮🇳</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0b0b0b;
      color: #f5e6c8;
    }

    header {
      text-align: center;
      padding: 20px;
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: gold;
      border-bottom: 1px solid rgba(255,215,0,0.3);
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #111;
      border: 1px solid rgba(255,215,0,0.3);
      color: #f5e6c8;
      border-radius: 8px;
    }

    button {
      margin-top: 12px;
      padding: 10px 20px;
      background: linear-gradient(45deg, gold, #d4af37);
      border: none;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    .post {
      margin-top: 15px;
      padding: 15px;
      background: #111;
      border-radius: 10px;
      border: 1px solid rgba(255,215,0,0.15);
    }

    .username {
      font-weight: bold;
      color: gold;
    }

    .category {
      font-size: 12px;
      color: #c9a44c;
    }

    .profile-box {
      background: #111;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(255,215,0,0.2);
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<header>BHĀRATI</header>

<div class="container">

  <!-- PROFILE SETUP -->
  <div class="profile-box">
    <h3>Your Profile</h3>
    <input id="username" placeholder="Enter your name" />
    <button onclick="saveProfile()">Save Profile</button>
    <p id="currentUser"></p>
  </div>

  <!-- CREATE POST -->
  <h3>Share Knowledge</h3>
  <textarea id="content" placeholder="Write your insight..."></textarea>
  <input id="category" placeholder="Category (Vedanta, Yoga)" />
  <button onclick="createPost()">Publish</button>

  <h2>ज्ञान Feed</h2>
  <div id="feed"></div>

</div>

<script>
  function getUser() {
    return localStorage.getItem("username");
  }

  function saveProfile() {
    const username = document.getElementById("username").value;
    localStorage.setItem("username", username);
    showUser();
  }

  function showUser() {
    const user = getUser();
    document.getElementById("currentUser").innerText =
      user ? "Logged in as: " + user : "No user set";
  }

  function getPosts() {
    return JSON.parse(localStorage.getItem("posts") || "[]");
  }

  function savePosts(posts) {
    localStorage.setItem("posts", JSON.stringify(posts));
  }

  function createPost() {
    const content = document.getElementById("content").value;
    const category = document.getElementById("category").value;
    const user = getUser();

    if (!user) {
      alert("Set your profile first");
      return;
    }

    const posts = getPosts();
    posts.push({
      username: user,
      content,
      category
    });

    savePosts(posts);
    document.getElementById("content").value = "";
    renderPosts();
  }

  function renderPosts() {
    const posts = getPosts().reverse();
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    posts.forEach(p => {
      const div = document.createElement("div");
      div.className = "post";
      div.innerHTML = `
        <div class="username">${p.username}</div>
        <div>${p.content}</div>
        <div class="category">${p.category}</div>
      `;
      feed.appendChild(div);
    });
  }

  showUser();
  renderPosts();
</script>

</body>
</html>
