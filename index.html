<!DOCTYPE html>
<html>
<head>
  <title>Bharati App 🇮🇳</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0b0b0b;
      color: #f5e6c8;
    }

    header {
      text-align: center;
      padding: 20px;
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: gold;
      border-bottom: 1px solid rgba(255,215,0,0.3);
      letter-spacing: 2px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    textarea, input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #111;
      border: 1px solid rgba(255,215,0,0.3);
      color: #f5e6c8;
      border-radius: 8px;
    }

    textarea:focus, input:focus {
      outline: none;
      border-color: gold;
      box-shadow: 0 0 10px rgba(255,215,0,0.3);
    }

    button {
      margin-top: 12px;
      padding: 10px 20px;
      background: linear-gradient(45deg, gold, #d4af37);
      border: none;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255,215,0,0.5);
    }

    .feed-title {
      margin-top: 30px;
      font-family: 'Playfair Display', serif;
      color: gold;
      border-bottom: 1px solid rgba(255,215,0,0.2);
      padding-bottom: 5px;
    }

    .post {
      margin-top: 15px;
      padding: 15px;
      background: #111;
      border-radius: 10px;
      border: 1px solid rgba(255,215,0,0.15);
      transition: 0.3s;
    }

    .post:hover {
      border-color: gold;
      transform: translateY(-3px);
    }

    .category {
      font-size: 12px;
      color: #c9a44c;
      margin-top: 5px;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

<header>BHĀRATI</header>

<div class="container">

  <h3>Share Knowledge</h3>

  <textarea id="content" placeholder="Write your insight..."></textarea>
  <input id="category" placeholder="Category (Vedanta, Yoga, Ayurveda)" />

  <button onclick="createPost()">Publish</button>

  <h2 class="feed-title">ज्ञान Feed</h2>
  <div id="feed"></div>

</div>

<footer>Dharmic Knowledge • Built for Bharat 🇮🇳</footer>

<script>
  function getPosts() {
    return JSON.parse(localStorage.getItem("posts") || "[]");
  }

  function savePosts(posts) {
    localStorage.setItem("posts", JSON.stringify(posts));
  }

  function renderPosts() {
    const posts = getPosts().reverse();
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    posts.forEach(p => {
      const div = document.createElement("div");
      div.className = "post";
      div.innerHTML = `
        <div>${p.content}</div>
        <div class="category">${p.category}</div>
      `;
      feed.appendChild(div);
    });
  }

  function createPost() {
    const content = document.getElementById("content").value;
    const category = document.getElementById("category").value;

    if (!content) return;

    const posts = getPosts();
    posts.push({ content, category });

    savePosts(posts);
    document.getElementById("content").value = "";
    renderPosts();
  }

  renderPosts();
</script>

</body>
</html>
